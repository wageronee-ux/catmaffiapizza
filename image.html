<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cats vs Hedgehogs: Pizza War</title>
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; font-family: 'Arial Black', sans-serif; overflow: hidden; color: white; }
        
        /* Меню */
        #menu {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://img.freepik.com/free-photo/delicious-pizza-indoors_23-2150873870.jpg');
            background-size: cover; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }

        h1 { font-size: 60px; color: #ffcc00; text-shadow: 5px 5px #e74c3c; text-align: center; margin-bottom: 10px; }
        .subtitle { font-size: 20px; color: #fff; margin-bottom: 40px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 10px; }

        .btn {
            padding: 20px 50px; font-size: 30px; cursor: pointer;
            background: #2e7d32; color: white; border: 4px solid #fff;
            border-radius: 50px; transition: 0.3s; text-transform: uppercase;
        }
        .btn:hover { background: #e74c3c; transform: scale(1.1); box-shadow: 0 0 20px #fff; }

        /* Интерфейс игры */
        #game-ui { position: absolute; top: 20px; left: 20px; display: none; font-size: 24px; z-index: 10; }
        canvas { display: none; background: #5c940d; border-top: 5px solid #fff; border-bottom: 5px solid #fff; }
        
        .pizza-icon { font-size: 40px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Кот-Итальянец <span style="color:#fff">VS</span> Ежи-Шаурмисты</h1>
        <div class="subtitle">Защити честь пиццы багетом и автоматом! 🍕🔫</div>
        <button class="btn" onclick="startGame()">ИГРАТЬ</button>
        <p style="margin-top: 20px;">Управление: <b>W / S</b> — Движение | <b>Клик</b> — Огонь</p>
    </div>

    <div id="game-ui">
        🍕 Пицца-очки: <span id="score">0</span> | ❤️ Здоровье: <span id="hp">5</span>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const ui = document.getElementById('game-ui');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let health = 5;
let gameActive = false;
const bullets = [];
const enemies = [];
const keys = {};

const player = { x: 100, y: canvas.height/2, w: 60, h: 60 };

function startGame() {
    menu.style.display = 'none';
    canvas.style.display = 'block';
    ui.style.display = 'block';
    gameActive = true;
    gameLoop();
}

window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;
window.onmousedown = () => { if(gameActive) bullets.push({ x: player.x + 60, y: player.y + 30 }); };

function gameLoop() {
    if(!gameActive) return;

    // Рисуем фон (Трава)
    ctx.fillStyle = '#5c940d';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Движение кота
    if(keys['KeyW'] && player.y > 50) player.y -= 8;
    if(keys['KeyS'] && player.y < canvas.height - 100) player.y += 8;

    // РИСУЕМ КОТА (Итальянец)
    ctx.fillStyle = '#f3e5ab'; // Кот
    ctx.fillRect(player.x, player.y, 60, 60);
    ctx.fillStyle = 'white'; // Поварской колпак
    ctx.fillRect(player.x + 5, player.y - 25, 50, 30);
    ctx.fillStyle = 'black'; // Автомат
    ctx.fillRect(player.x + 40, player.y + 35, 50, 12);

    // БАГЕТЫ (Пули)
    ctx.fillStyle = '#DEB887';
    bullets.forEach((b, i) => {
        b.x += 15;
        ctx.fillRect(b.x, b.y, 40, 10);
        ctx.strokeStyle = '#8B4513';
        ctx.strokeRect(b.x, b.y, 40, 10);
        if(b.x > canvas.width) bullets.splice(i, 1);
    });

    // ЕЖИ С ШАУРМОЙ (Враги)
    if(Math.random() < 0.03) {
        enemies.push({ x: canvas.width, y: Math.random() * (canvas.height - 100) + 50, s: 4 + Math.random() * 5 });
    }

    enemies.forEach((en, i) => {
        en.x -= en.s;
        
        // Рисуем ежа
        ctx.fillStyle = '#444';
        ctx.beginPath(); ctx.arc(en.x, en.y, 25, 0, 7); ctx.fill();
        // Шампур с шаурмой
        ctx.strokeStyle = '#ddd'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(en.x, en.y); ctx.lineTo(en.x - 40, en.y); ctx.stroke();
        ctx.fillStyle = '#d2b48c'; // Шаурма на шампуре
        ctx.fillRect(en.x - 35, en.y - 10, 20, 20);

        // Столкновение с багетом
        bullets.forEach((b, bi) => {
            if(b.x > en.x - 25 && b.x < en.x + 25 && b.y > en.y - 25 && b.y < en.y + 25) {
                enemies.splice(i, 1);
                bullets.splice(bi, 1);
                score += 10;
                document.getElementById('score').innerText = score;
            }
        });

        // Удар шампуром
        if(en.x < player.x + 60 && en.x > player.x && en.y > player.y && en.y < player.y + 60) {
            enemies.splice(i, 1);
            health--;
            document.getElementById('hp').innerText = health;
            if(health <= 0) {
                alert("Ежи захватили пиццерию! Финита ля комедия. Счет: " + score);
                location.reload();
            }
        }
    });

    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
