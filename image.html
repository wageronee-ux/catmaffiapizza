<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Maffia Pizza</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; text-align: center; border: 10px solid #2e7d32; }
        h1 { font-size: 50px; color: #e74c3c; text-shadow: 3px 3px #fff; margin: 0; }
        .btn { padding: 20px 60px; font-size: 30px; background: #2e7d32; color: #fff; border: none; cursor: pointer; border-radius: 5px; margin-top: 20px; font-weight: bold; }
        .btn:hover { background: #c0392b; }
        canvas { display: block; background: #1a1a1a; cursor: crosshair; }
        #stats { position: absolute; top: 10px; left: 10px; font-size: 22px; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="stats" style="display:none">
        🍕 Пицца-репутация: <span id="score">0</span> | ❤️ Семья: <span id="hp">5</span>
    </div>
    <div id="overlay">
        <h1>CAT MAFFIA: PIZZA WARS</h1>
        <p>Ежи-шаурмисты зашли на твою территорию. <br> Скорми им свои смертоносные багеты!</p>
        <button class="btn" onclick="start()">ВСТУПИТЬ В ИГРУ</button>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let score = 0, hp = 5, active = false;
const player = { x: 80, y: 200, w: 60, h: 60 };
const bullets = [], enemies = [];

function start() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('stats').style.display = 'block';
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    active = true;
    requestAnimationFrame(loop);
}

window.addEventListener('mousedown', () => {
    if(active) bullets.push({ x: player.x + 60, y: player.y + 35 });
});

window.addEventListener('mousemove', (e) => {
    if(active) player.y = e.clientY - 30;
});

function loop() {
    if(!active) return;
    ctx.fillStyle = '#1a472a'; // Темно-зеленый (цвет мафии)
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Рисуем Кота-Мафиози
    ctx.fillStyle = '#333'; // Костюм
    ctx.fillRect(player.x, player.y, 60, 60);
    ctx.fillStyle = '#f3e5ab'; // Морда
    ctx.fillRect(player.x + 10, player.y + 10, 40, 30);
    ctx.fillStyle = 'white'; // Шляпа дона
    ctx.fillRect(player.x - 5, player.y, 70, 10);
    ctx.fillRect(player.x + 10, player.y - 15, 40, 15);

    // Пули-Багеты
    ctx.fillStyle = '#DEB887';
    bullets.forEach((b, i) => {
        b.x += 15;
        ctx.fillRect(b.x, b.y, 35, 12);
        ctx.strokeStyle = '#8B4513';
        ctx.strokeRect(b.x, b.y, 35, 12);
        if(b.x > canvas.width) bullets.splice(i, 1);
    });

    // Ежи с шаурмой (Враги)
    if(Math.random() < 0.04) {
        enemies.push({ x: canvas.width, y: Math.random()*(canvas.height-60), s: 6 + Math.random()*4 });
    }

    enemies.forEach((en, i) => {
        en.x -= en.s;
        // Тело ежа
        ctx.fillStyle = '#444';
        ctx.beginPath(); ctx.arc(en.x, en.y + 30, 25, 0, 7); ctx.fill();
        // Шампур
        ctx.strokeStyle = '#999'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(en.x, en.y+30); ctx.lineTo(en.x-40, en.y+30); ctx.stroke();

        // Попадание
        bullets.forEach((b, bi) => {
            if(b.x > en.x - 25 && b.y > en.y && b.y < en.y + 60) {
                enemies.splice(i, 1); bullets.splice(bi, 1);
                score += 10; document.getElementById('score').innerText = score;
            }
        });

        // Урон
        if(en.x < player.x + 60 && en.y > player.y - 30 && en.y < player.y + 60) {
            enemies.splice(i, 1); hp--; document.getElementById('hp').innerText = hp;
            if(hp <= 0) {
                active = false;
                alert("Ежи захватили рынок. Твой результат: " + score);
                location.reload();
            }
        }
    });

    requestAnimationFrame(loop);
}
</script>
</body>
</html>
