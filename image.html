<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cats vs Hedgehogs: Pizza War</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: Arial, sans-serif; }
        canvas { display: block; background: #87CEEB; } /* Голубое небо Италии */
        #ui { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px 0 #000; font-size: 20px; }
    </style>
</head>
<body>
    <div id="ui">Счет: <span id="score">0</span> | Жизни: <span id="hp">3</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const hpEl = document.getElementById('hp');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let health = 3;
let gameOver = false;

// Игрок (Кот)
const player = {
    x: 50,
    y: canvas.height / 2,
    w: 60,
    h: 60,
    speed: 5,
    color: '#f3e5ab' // Цвет кота
};

const bullets = [];
const enemies = [];
const keys = {};

// Управление
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', shoot);

function shoot() {
    if(gameOver) return;
    bullets.push({
        x: player.x + player.w,
        y: player.y + player.h / 2,
        speed: 10,
        size: 30 // Размер багета
    });
}

function spawnEnemy() {
    if(gameOver) return;
    enemies.push({
        x: canvas.width,
        y: Math.random() * (canvas.height - 100) + 50,
        w: 50,
        h: 50,
        speed: 2 + Math.random() * 3
    });
}

setInterval(spawnEnemy, 1500);

function update() {
    if(gameOver) return;

    // Движение кота
    if (keys['KeyW'] && player.y > 0) player.y -= player.speed;
    if (keys['KeyS'] && player.y < canvas.height - player.h) player.y += player.speed;

    // Пули (Багеты)
    bullets.forEach((b, index) => {
        b.x += b.speed;
        if(b.x > canvas.width) bullets.splice(index, 1);
    });

    // Враги (Ежи)
    enemies.forEach((en, eIdx) => {
        en.x -= en.speed;

        // Столкновение багета с ежом
        bullets.forEach((b, bIdx) => {
            if(b.x < en.x + en.w && b.x + b.size > en.x && b.y < en.y + en.h && b.y + 10 > en.y) {
                enemies.splice(eIdx, 1);
                bullets.splice(bIdx, 1);
                score += 10;
                scoreEl.innerText = score;
            }
        });

        // Столкновение ежа с котом
        if(en.x < player.x + player.w && en.x + en.w > player.x && en.y < player.y + player.h && en.y + en.h > player.y) {
            enemies.splice(eIdx, 1);
            health--;
            hpEl.innerText = health;
            if(health <= 0) {
                gameOver = true;
                alert("Ежи захватили рынок еды! Твой счет: " + score);
                location.reload();
            }
        }

        if(en.x < -50) enemies.splice(eIdx, 1);
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Рисуем кота (Итальянец)
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.w, player.h);
    // Колпак
    ctx.fillStyle = "white";
    ctx.fillRect(player.x + 10, player.y - 20, 40, 25);
    // Автомат
    ctx.fillStyle = "black";
    ctx.fillRect(player.x + 40, player.y + 30, 40, 10);

    // Рисуем багеты (Пули)
    ctx.fillStyle = "#DEB887";
    bullets.forEach(b => {
        ctx.fillRect(b.x, b.y, b.size, 10);
        ctx.strokeStyle = "#8B4513";
        ctx.strokeRect(b.x, b.y, b.size, 10);
    });

    // Рисуем ежей (Шампуристы)
    enemies.forEach(en => {
        ctx.fillStyle = "#555"; // Тело ежа
        ctx.beginPath();
        ctx.arc(en.x + 25, en.y + 25, 25, 0, Math.PI * 2);
        ctx.fill();
        // Шампур
        ctx.strokeStyle = "silver";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(en.x, en.y + 25);
        ctx.lineTo(en.x - 30, en.y + 25);
        ctx.stroke();
    });

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
